<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>FRIME Studio</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e5e5e5;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 64px;
      margin: 0;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .subtitle {
      margin-top: 10px;
      color: #666;
      font-size: 18px;
    }

    .gallery {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 20px;
      transition: 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <h1>FRIME</h1>
    <div class="subtitle">Fryzjer Warszawa, Wilcza 26</div>

    <div class="gallery">
      <img src="1.png" alt="">
      <img src="2.png" alt="">
      <img src="3.png" alt="">
      <img src="4.png" alt="">
      <img src="5.png" alt="">
      <img src="6.png" alt="">
      <img src="7.png" alt="">
      <img src="8.png" alt="">
    </div>

    <div class="footer">
      © FRIME Studio
    </div>

  </div>

</body>
</html>
