<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRIME</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    text-align: center;
}

/* LOGO */

.logo {
    font-weight: 900;
    font-size: 52px;
    letter-spacing: 4px;
    margin: 40px 0 5px;

    /* делает визуально жирнее */
    text-shadow: 
        0.8px 0 #000,
        -0.8px 0 #000;
}

/* SUBTITLE */

.subtitle {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 2px;
    color: #777;
    margin-bottom: 30px;
}

/* CONTENT */

.container {
    max-width: 420px;
    margin: 0 auto;
}

/* SLIDER */

.slider {
    width: 100%;
    height: 500px;
    overflow: hidden;
    border-radius: 20px;
}

.slides {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease;
}

.slide {
    min-width: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */

.buttons {
    margin: 35px 0 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.btn {
    background: black;
    color: white;
    border: none;
    border-radius: 12px;
    width: 100%;
    max-width: 320px;
    padding: 16px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    background: #222;
    transform: translateY(-1px);
}

.btn:active {
    transform: translateY(1px);
}

</style>
<!-- Facebook Pixel Code -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '24485365207832776');
  fbq('track', 'PageView');
</script>
<noscript>
  <img height="1" width="1" style="display:none" 
       src="https://www.facebook.com/tr?id=24485365207832776&ev=PageView&noscript=1"/>
</noscript>
<!-- End Facebook Pixel Code -->
</head>

<body>

<div class="logo">FRIME</div>
<div class="subtitle">Fryzjer Warszawa, Wilcza 26</div>

<div class="container">

<div class="slider">
<div class="slides" id="slides">

<div class="slide"><img src="1.png"></div>
<div class="slide"><img src="2.png"></div>
<div class="slide"><img src="3.png"></div>
<div class="slide"><img src="4.png"></div>
<div class="slide"><img src="5.png"></div>
<div class="slide"><img src="6.png"></div>
<div class="slide"><img src="7.png"></div>
<div class="slide"><img src="8.png"></div>

</div>
</div>

<div class="buttons">
<button class="btn" id="booksy"></button>
<button class="btn" id="instagram"></button>
<button class="btn" id="map"></button>
</div>

</div>

<script>

/* SLIDER */

let index = 0;
const total = 8;

function showSlide() {
    document.getElementById("slides").style.transform =
        "translateX(-" + index * 100 + "%)";
}

function autoSlide() {
    index++;
    if (index >= total) index = 0;
    showSlide();
}

setInterval(autoSlide, 4000);

/* SWIPE */

let startX = 0;
const slider = document.querySelector(".slider");

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 50) index--;
    if (diff < -50) index++;

    if (index < 0) index = total - 1;
    if (index >= total) index = 0;

    showSlide();
});

/* LANGUAGE */

const lang = navigator.language;

const text = {
    pl: {
        booksy: "Rezerwuj wizytę",
        instagram: "Instagram",
        map: "Jak do nas trafić"
    },
    en: {
        booksy: "Book now",
        instagram: "Instagram",
        map: "Find us"
    },
    ru: {
        booksy: "Записаться",
        instagram: "Instagram",
        map: "Как добраться"
    }
};

let current = "pl";

if (lang.startsWith("ru")) current = "ru";
else if (lang.startsWith("en")) current = "en";

document.getElementById("booksy").innerText = text[current].booksy;
document.getElementById("instagram").innerText = text[current].instagram;
document.getElementById("map").innerText = text[current].map;

/* LINKS */

document.getElementById("booksy").onclick = () => {
    fbq('trackCustom', 'BooksyClick');
    location.href = "https://frimestudio.booksy.com/";
};

document.getElementById("instagram").onclick = () =>
    location.href = "https://www.instagram.com/frime.studio";

document.getElementById("map").onclick = () =>
    location.href = "https://maps.google.com";

</script>

</body>
</html>
