<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRIME</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">

<!-- FAVICON -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>F</text></svg>">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    text-align: center;
    animation: fadeIn 0.8s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LOGO */

.logo {
    font-weight: 900;
    font-size: 52px;
    letter-spacing: 6px;
    margin: 40px 0 5px;
}

/* SUBTITLE */

.subtitle {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 2px;
    color: #777;
    margin-bottom: 30px;
}

/* CONTENT */

.container {
    max-width: 420px;
    margin: 0 auto;
}

/* SLIDER */

.slider {
    width: 100%;
    height: 500px;
    overflow: hidden;
    border-radius: 20px;
}

.slides {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease;
}

.slide {
    min-width: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */

.buttons {
    margin: 35px 0 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.btn {
    background: black;
    color: white;
    border: none;
    border-radius: 12px;

    width: 100%;
    max-width: 320px;

    padding: 16px;

    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;

    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    background: #222;
    transform: translateY(-1px);
}

.btn:active {
    transform: translateY(1px);
}

</style>

</head>
<body>

<div class="logo">FRIME</div>
<div class="subtitle">Fryzjer Warszawa, Wilcza 26</div>

<div class="container">

    <div class="slider">
        <div class="slides" id="slides">
            <div class="slide"><img src="1.jpg"></div>
            <div class="slide"><img src="2.jpg"></div>
            <div class="slide"><img src="3.jpg"></div>
        </div>
    </div>

    <div class="buttons">
        <button class="btn" id="booksy"></button>
        <button class="btn" id="instagram"></button>
        <button class="btn" id="map"></button>
    </div>

</div>

<script>

/* SLIDER */

let index = 0;

function showSlide() {
    document.getElementById("slides").style.transform =
        "translateX(-" + index * 100 + "%)";
}

function autoSlide() {
    index++;
    if (index > 2) index = 0;
    showSlide();
}

setInterval(autoSlide, 4000);

/* SWIPE */

let startX = 0;

const slider = document.querySelector(".slider");

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 50) index--;
    if (diff < -50) index++;

    if (index < 0) index = 2;
    if (index > 2) index = 0;

    showSlide();
});

/* LANGUAGE */

const lang = navigator.language;

const text = {
    pl: {
        booksy: "Rezerwuj wizytę",
        instagram: "Instagram",
        map: "Jak do nas trafić"
    },
    en: {
        booksy: "Book now",
        instagram: "Instagram",
        map: "Find us"
    },
    ru: {
        booksy: "Записаться",
        instagram: "Instagram",
        map: "Как добраться"
    }
};

let current = "pl";

if (lang.startsWith("ru")) current = "ru";
else if (lang.startsWith("en")) current = "en";

document.getElementById("booksy").innerText = text[current].booksy;
document.getElementById("instagram").innerText = text[current].instagram;
document.getElementById("map").innerText = text[current].map;

/* LINKS */

document.getElementById("booksy").onclick = () =>
    location.href = "http://frimestudio.booksy.com/";

document.getElementById("instagram").onclick = () =>
    location.href = "https://www.instagram.com/frime.studio";

document.getElementById("map").onclick = () =>
    location.href = "https://share.google/SiRbBDsLLvYU9gmqO";

</script>

</body>
</html>
