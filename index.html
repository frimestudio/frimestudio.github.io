<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XCHYHRYZ6E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XCHYHRYZ6E');
</script>
<title>FRIME</title>

<style>

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f2;
    text-align: center;
}

/* LOGO */

.logo {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 6px;
    margin: 30px 0 20px;
}

/* CONTENT */

.container {
    max-width: 420px;
    margin: 0 auto;
}

/* SLIDER */

.slider {
    width: 100%;
    height: 500px;
    overflow: hidden;
    border-radius: 16px;
    background: #ddd;
}

.slides {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease;
}

.slide {
    min-width: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */

.buttons {
    margin: 30px 0 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.btn {
    background: black;
    color: white;
    border: none;
    border-radius: 8px;

    width: 100%;
    max-width: 320px;

    padding: 14px 18px;

    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;

    cursor: pointer;
    transition: all 0.15s ease;

    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn:hover {
    background: #111;
}

.btn:active {
    transform: translateY(1px);
}

/* SLIDER LOGIC STYLE END */

</style>

</head>
<body>

<div class="logo">FRIME</div>

<div class="container">

    <div class="slider">
        <div class="slides" id="slides">
            <div class="slide"><img src="1.jpg"></div>
            <div class="slide"><img src="2.jpg"></div>
            <div class="slide"><img src="3.jpg"></div>
        </div>
    </div>

    <div class="buttons">
        <button class="btn" id="booksy"></button>
        <button class="btn" id="instagram"></button>
        <button class="btn" id="map"></button>
    </div>

</div>

<script>

/* SLIDER */

let index = 0;

function showSlide() {
    document.getElementById("slides").style.transform =
        "translateX(-" + index * 100 + "%)";
}

function autoSlide() {
    index++;
    if (index > 2) index = 0;
    showSlide();
}

setInterval(autoSlide, 3500);

/* SWIPE */

let startX = 0;

const slider = document.querySelector(".slider");

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 50) index--;
    if (diff < -50) index++;

    if (index < 0) index = 2;
    if (index > 2) index = 0;

    showSlide();
});

/* LANGUAGE */

const lang = navigator.language;

const text = {
    pl: {
        booksy: "Rezerwuj",
        instagram: "Instagram",
        map: "Mapa"
    },
    en: {
        booksy: "Book now",
        instagram: "Instagram",
        map: "Map"
    },
    ru: {
        booksy: "Записаться",
        instagram: "Instagram",
        map: "Показать на карте"
    }
};

let current = "pl";

if (lang.startsWith("ru")) current = "ru";
else if (lang.startsWith("en")) current = "en";

document.getElementById("booksy").innerText = text[current].booksy;
document.getElementById("instagram").innerText = text[current].instagram;
document.getElementById("map").innerText = text[current].map;

/* LINKS */

document.getElementById("booksy").onclick = () =>
    location.href = "http://frimestudio.booksy.com/";

document.getElementById("instagram").onclick = () =>
    location.href = "https://www.instagram.com/frime.studio";

document.getElementById("map").onclick = () =>
    location.href = "https://share.google/SiRbBDsLLvYU9gmqO";

</script>

</body>
</html>
